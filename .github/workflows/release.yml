# Build hearken for macOS + Windows and attach the artifacts to a GitHub Release.
# Triggers on a version tag (e.g. v0.1.0). DRAFT — not yet validated on CI.
#
# macOS distribution note: this produces an UNSIGNED/ad-hoc .app, so users must
# right-click -> Open the first time (Gatekeeper). For a clean release, add an Apple
# Developer ID cert + notarization (secrets + a notarytool step). The local
# self-signed cert (scripts/make-signing-cert.sh) only fixes TCC persistence on the
# dev machine; it is NOT used in CI.
name: release
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.21' }
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      - run: wails build -platform darwin/universal
      - name: Package .app (zip + drag-to-Applications dmg)
        run: |
          ditto -c -k --keepParent build/bin/hearken.app hearken-macos.zip
          mkdir -p dmg && cp -R build/bin/hearken.app dmg/ && ln -s /Applications dmg/Applications
          hdiutil create -volname hearken -srcfolder dmg -ov -format UDZO hearken-macos.dmg
      - uses: actions/upload-artifact@v4
        with: { name: hearken-macos, path: "hearken-macos.*" }

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.21' }
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      - run: wails build -platform windows/amd64
      - name: Compile audio helpers (capture.exe / play.exe)
        shell: pwsh
        run: |
          $csc = "C:\Windows\Microsoft.NET\Framework64\v4.0.30319\csc.exe"
          New-Item -ItemType Directory -Force -Path dist\lib | Out-Null
          Copy-Item windows\lib\NAudio.dll dist\lib
          foreach ($n in 'capture','play') {
            & $csc /nologo /target:exe /out:"dist\lib\$n.exe" /r:"windows\lib\NAudio.dll" "windows\lib\$n.cs"
          }
          Copy-Item build\bin\hearken.exe dist\
          Compress-Archive -Path dist\* -DestinationPath hearken-windows.zip -Force
      - uses: actions/upload-artifact@v4
        with: { name: hearken-windows, path: hearken-windows.zip }

  release:
    needs: [macos, windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with: { path: artifacts }
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.zip
            artifacts/**/*.dmg
          generate_release_notes: true
